<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Verification</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h2>Signature Verification</h2>
        <form method="POST" enctype="multipart/form-data">
            <label>Upload First Signature:</label>
            <input type="file" name="image1" required><br>
            <label>Upload Second Signature:</label>
            <input type="file" name="image2" required><br>
            <button type="submit">Verify</button>
        </form>
        {% if result %}
            <h3>Result: {{ result }}</h3>
        {% endif %}
        <a href="{{ url_for('main.dashboard') }}"><button>Back to Dashboard</button></a>
    </div>
</body>
</html>
