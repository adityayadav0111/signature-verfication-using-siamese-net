<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>SignSecure - Draw Signature</title>
  </head>
  <body class="bg-nav">
    <nav class="navbar bg-nav">
        <a href="/" class="navbar-brand text-light">SignSecure</a>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-md-8">
              <h1 class="text-light display-4 mt-100">Your Signature Defines You. We Defend It.</h1>
            </div>
            <div class="col-md-4">
                <div class="card mt-100" style="width: 100%; max-width: 600px;">
                    <div class="card-body">
                        <h2 class="text-center">Draw Signature</h2>
                        <!-- Larger Canvas -->
                        <div style="width: 100%; height: 300px; border: 1px solid #000; margin-bottom: 10px; margin-top: 10px;">
                            <canvas id="signatureCanvas" width="550" height="300"></canvas>
                        </div>
                        <!-- Buttons -->
                        <div class="d-flex justify-content-between">
                            <button id="clearCanvas" class="btn btn-secondary">Clear</button>
                            <button id="saveCanvas" class="btn btn-primary"><a href="/dashboard"></a>Save</button>
                            <button id="compareCanvas" class="btn btn-success"><a href="/canvas_result"></a>Compare</button>
                        </div>
                        <p class="mt-3 text-center"><a href="/dashboard">Back to Dashboard</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
      // JavaScript for Canvas Functionality
      const canvas = document.getElementById('signatureCanvas');
      const ctx = canvas.getContext('2d');
      let isDrawing = false;

      // Start Drawing
      canvas.addEventListener('mousedown', (e) => {
        isDrawing = true;
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
      });

      // Draw
      canvas.addEventListener('mousemove', (e) => {
        if (isDrawing) {
          ctx.lineTo(e.offsetX, e.offsetY);
          ctx.stroke();
        }
      });

      // Stop Drawing
      canvas.addEventListener('mouseup', () => {
        isDrawing = false;
        ctx.closePath();
      });

      // Clear Canvas
      document.getElementById('clearCanvas').addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      });

      // Save Canvas
      document.getElementById('saveCanvas').addEventListener('click', () => {
        const image = canvas.toDataURL('image/png'); // Convert canvas to base64 image
        fetch('/save_canvas', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ image: image }),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.message) {
              alert(data.message); // Show success message
              window.location.href = '/dashboard'; // Redirect to dashboard
            } else if (data.error) {
              alert(data.error); // Show error message
            }
          })
          .catch((error) => {
            console.error('Error:', error);
          });
      });

      // Compare Canvas
document.getElementById('compareCanvas').addEventListener('click', () => {
    const image = canvas.toDataURL('image/png'); // Convert canvas to base64 image
    fetch('/compare_canvas', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ image: image }),
    })
        .then((response) => response.json())
        .then((data) => {
            if (data.redirect) {
                window.location.href = data.redirect; // Redirect to canvas_result page
            } else if (data.error) {
                alert(data.error); // Show error message
            }
        })
        .catch((error) => {
            console.error('Error:', error);
        });
});
    </script>
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
  </body>
</html>
