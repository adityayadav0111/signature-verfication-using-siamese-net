<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Comparison Results</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <style>
      .result { margin-top: 20px; }
      .result p { font-size: 1.1em; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>All Reference Comparisons</h1>
      {% if results %}
        <div class="result">
          {% for user, ref_path, score in results %}
            <div class="card mb-3">
              <div class="card-body">
                <h4>User: {{ user.full_name }}</h4>
                <p>Reference: {{ ref_path }}</p>
                <p>Similarity Score: {{ "%.4f"|format(score) }}</p>
              </div>
            </div>
          {% endfor %}
        </div>
      {% else %}
        <p>No reference signatures available for comparison.</p>
      {% endif %}
      <a href="/dashboard" class="btn btn-primary">Back to Dashboard</a>
    </div>
  </body>
</html>
